<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex 玩偶</title>
    <style>
      :root {
        --size: 16cm;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      button {
        width: var(--size);
        height: var(--size);
        min-width: 10cm;
        min-height: 10cm;
        border: 0;
        padding: 0;
        background: transparent url("assets/codex_doll_four_modes.png") no-repeat 0 0 / 200% 200%;
        cursor: pointer;
      }

      button[data-mode="thinking"] {
        background-position: 100% 0;
      }

      button[data-mode="working"] {
        background-position: 0 100%;
      }

      button[data-mode="done"] {
        background-position: 100% 100%;
      }
    </style>
  </head>
  <body>
    <button id="doll" type="button" data-mode="idle" aria-label="Codex 玩偶"></button>
    <script>
      const modes = ["idle", "thinking", "working", "done"];
      const doll = document.querySelector("#doll");
      doll.addEventListener("click", () => {
        const next = (modes.indexOf(doll.dataset.mode) + 1) % modes.length;
        doll.dataset.mode = modes[next];
      });
    </script>
  </body>
</html>
