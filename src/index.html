<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>艺术灵感工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="策展工具">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Curator Desk</p>
            <h1>艺术灵感工作台</h1>
          </div>
        </div>

        <section class="panel">
          <div class="panel-heading">
            <h2>筛选</h2>
            <button class="icon-button" id="resetFilters" type="button" aria-label="重置筛选" title="重置筛选">
              ↺
            </button>
          </div>

          <label class="field">
            <span>风格</span>
            <select id="styleFilter">
              <option value="all">全部风格</option>
              <option value="现代">现代</option>
              <option value="东方">东方</option>
              <option value="抽象">抽象</option>
              <option value="古典">古典</option>
            </select>
          </label>

          <label class="field">
            <span>情绪强度</span>
            <input id="energyFilter" type="range" min="1" max="5" value="1" />
          </label>

          <div class="palette-picker" aria-label="色彩偏好">
            <button class="swatch active" type="button" data-palette="all" aria-label="全部色彩"></button>
            <button class="swatch" type="button" data-palette="warm" aria-label="暖色"></button>
            <button class="swatch" type="button" data-palette="cool" aria-label="冷色"></button>
            <button class="swatch" type="button" data-palette="earth" aria-label="土地色"></button>
          </div>
        </section>

        <section class="panel compact">
          <h2>画布参数</h2>
          <label class="field">
            <span>层次</span>
            <input id="layerControl" type="range" min="4" max="18" value="10" />
          </label>
          <label class="field">
            <span>笔触</span>
            <input id="strokeControl" type="range" min="10" max="80" value="38" />
          </label>
          <button class="primary-action" id="shuffleCanvas" type="button">生成新构图</button>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Private Collection</p>
            <h2>把视觉线索整理成可执行的创作方向</h2>
          </div>
          <div class="stats">
            <span><strong id="visibleCount">0</strong> 件作品</span>
            <span><strong id="moodScore">0</strong> 平均张力</span>
          </div>
        </header>

        <section class="studio">
          <div class="canvas-stage">
            <canvas id="artCanvas" width="920" height="560" aria-label="生成式抽象艺术画布"></canvas>
          </div>
          <article class="focus-panel" id="focusPanel">
            <p class="eyebrow">Focused Work</p>
            <h3 id="focusTitle">选择一件作品</h3>
            <p id="focusMeta">点击下方作品卡片，查看策展备注和色彩线索。</p>
            <div class="tags" id="focusTags"></div>
          </article>
        </section>

        <section class="gallery" id="gallery" aria-label="作品列表"></section>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
